<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Dashboard')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('dashboard')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <h1 class="text-lg font-semibold text-gray-800">Dashboard</h1>
    </header>
    <main class="flex-1 p-8">

        <div class="grid grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow p-6">
                <p class="text-sm text-gray-500">Pesanan Hari Ini</p>
                <p class="text-3xl font-bold text-gray-800 mt-1" th:text="${stats.ordersToday()}">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6">
                <p class="text-sm text-gray-500">Pendapatan Hari Ini</p>
                <p class="text-3xl font-bold text-rose-600 mt-1"
                   th:text="'Rp ' + ${#numbers.formatInteger(stats.revenueToday(), 0, 'COMMA')}">Rp 0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6">
                <p class="text-sm text-gray-500">Pesanan Pending</p>
                <p class="text-3xl font-bold text-yellow-500 mt-1" th:text="${stats.pendingOrders()}">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6">
                <p class="text-sm text-gray-500">Total Pesanan</p>
                <p class="text-3xl font-bold text-gray-800 mt-1" th:text="${stats.totalOrders()}">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6">
                <p class="text-sm text-gray-500">Total Pendapatan</p>
                <p class="text-3xl font-bold text-green-600 mt-1"
                   th:text="'Rp ' + ${#numbers.formatInteger(stats.totalRevenue(), 0, 'COMMA')}">Rp 0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-6">
                <p class="text-sm text-gray-500">Undangan Aktif</p>
                <p class="text-3xl font-bold text-blue-600 mt-1" th:text="${stats.activeInvitations()}">0</p>
            </div>
        </div>

        <div class="flex gap-4">
            <a th:href="@{/admin/orders(status='PENDING')}"
               class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded text-sm font-medium">
                Lihat Pesanan Pending
            </a>
            <a th:href="@{/admin/orders/export.csv}"
               class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded text-sm font-medium">
                Export Semua Pesanan (CSV)
            </a>
        </div>

    </main>
</div>

</body>
</html>
