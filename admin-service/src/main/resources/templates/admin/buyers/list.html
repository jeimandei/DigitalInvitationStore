<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Daftar Pembeli')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('buyers')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <h1 class="text-lg font-semibold text-gray-800">Daftar Pembeli</h1>
    </header>
    <main class="flex-1 p-8">

        <div class="bg-white rounded-xl shadow p-4 mb-6 flex gap-3 items-end">
            <form method="get" th:action="@{/admin/buyers}" class="flex gap-3">
                <input type="text" name="search" placeholder="Cari nama / email..."
                       th:value="${currentSearch}"
                       class="border rounded px-3 py-2 text-sm w-64"/>
                <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded text-sm">Cari</button>
            </form>
            <a th:href="@{/admin/orders/export.csv(status='PAID')}"
               class="ml-auto bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded text-sm">
                Export CSV
            </a>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">Nama Pasangan</th>
                    <th class="px-4 py-3 text-left">Email</th>
                    <th class="px-4 py-3 text-left">WhatsApp</th>
                    <th class="px-4 py-3 text-left">Tier</th>
                    <th class="px-4 py-3 text-left">Tanggal Bayar</th>
                    <th class="px-4 py-3 text-left">Slug</th>
                    <th class="px-4 py-3"></th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="o : ${orders.content()}" class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium" th:text="${o.coupleName()}"></td>
                    <td class="px-4 py-3 text-gray-500" th:text="${o.contactEmail() ?: '-'}"></td>
                    <td class="px-4 py-3 text-gray-500" th:text="${o.contactWhatsapp() ?: '-'}"></td>
                    <td class="px-4 py-3">
                        <span th:if="${o.tier() == 1}" class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs">Dasar</span>
                        <span th:if="${o.tier() == 2}" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">Standar</span>
                        <span th:if="${o.tier() == 3}" class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-xs">Premium</span>
                    </td>
                    <td class="px-4 py-3 text-gray-500 text-xs"
                        th:text="${o.paidAt() != null ? #temporals.format(o.paidAt(), 'dd MMM yyyy') : '-'}"></td>
                    <td class="px-4 py-3 font-mono text-xs text-gray-500" th:text="${o.coupleSlug() ?: '-'}"></td>
                    <td class="px-4 py-3">
                        <a th:href="@{/admin/orders/{id}(id=${o.id()})}"
                           class="text-rose-600 hover:underline text-xs">Detail</a>
                    </td>
                </tr>
                <tr th:if="${orders.content().isEmpty()}">
                    <td colspan="7" class="px-4 py-8 text-center text-gray-400">Tidak ada data pembeli.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-between items-center mt-4 text-sm text-gray-600" th:if="${orders.totalPages() > 1}">
            <span th:text="'Halaman ' + (${orders.page()} + 1) + ' dari ' + ${orders.totalPages()}"></span>
            <div class="flex gap-2">
                <a th:if="${orders.page() > 0}"
                   th:href="@{/admin/buyers(page=${orders.page()-1},search=${currentSearch})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Sebelumnya</a>
                <a th:if="${!orders.last()}"
                   th:href="@{/admin/buyers(page=${orders.page()+1},search=${currentSearch})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Selanjutnya</a>
            </div>
        </div>

    </main>
</div>

</body>
</html>
