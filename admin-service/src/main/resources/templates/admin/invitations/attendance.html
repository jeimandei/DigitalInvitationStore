<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Kehadiran')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('invitations')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <a th:href="@{/admin/invitations/{id}(id=${invitationId})}"
           class="text-gray-400 hover:text-gray-600 text-sm">← Detail Undangan</a>
        <h1 class="text-lg font-semibold text-gray-800 mt-1">Statistik Kehadiran</h1>
    </header>
    <main class="flex-1 p-8">

        <div th:if="${attendance != null}">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow p-6 text-center">
                    <p class="text-3xl font-bold text-gray-800" th:text="${attendance.totalInvited()}">0</p>
                    <p class="text-xs text-gray-500 mt-1 uppercase">Total Diundang</p>
                </div>
                <div class="bg-white rounded-xl shadow p-6 text-center">
                    <p class="text-3xl font-bold text-gray-800" th:text="${attendance.totalAllotted()}">0</p>
                    <p class="text-xs text-gray-500 mt-1 uppercase">Total Jatah</p>
                </div>
                <div class="bg-white rounded-xl shadow p-6 text-center">
                    <p class="text-3xl font-bold text-green-600" th:text="${attendance.checkedInGuests()}">0</p>
                    <p class="text-xs text-gray-500 mt-1 uppercase">Tamu Check-in</p>
                </div>
                <div class="bg-white rounded-xl shadow p-6 text-center">
                    <p class="text-3xl font-bold text-green-600" th:text="${attendance.checkedInCount()}">0</p>
                    <p class="text-xs text-gray-500 mt-1 uppercase">Total Hadir</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-gray-600">Persentase Kehadiran</span>
                    <span class="text-sm font-bold text-gray-800" th:text="${attendance.percentage()} + '%'">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-4">
                    <div class="bg-rose-500 h-4 rounded-full transition-all"
                         th:style="'width: ' + ${attendance.percentage()} + '%'"></div>
                </div>
            </div>
        </div>

        <div th:if="${attendance == null}" class="bg-white rounded-xl shadow p-12 text-center text-gray-400">
            Data kehadiran tidak tersedia.
        </div>

    </main>
</div>

</body>
</html>
