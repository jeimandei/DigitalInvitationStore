<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Rekening Amplop')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('invitations')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <a th:href="@{/admin/invitations/{id}(id=${invitationId})}"
           class="text-gray-400 hover:text-gray-600 text-sm">← Detail Undangan</a>
        <h1 class="text-lg font-semibold text-gray-800 mt-1">Rekening Amplop Digital</h1>
    </header>
    <main class="flex-1 p-8">

        <div class="bg-white rounded-xl shadow p-6 max-w-lg">
            <form th:action="@{/admin/invitations/{id}/gift-account(id=${invitationId})}" method="post"
                  class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Nama Bank</label>
                    <input type="text" name="bankName"
                           th:value="${account != null ? account.bankName() : ''}"
                           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-400"
                           placeholder="BCA, BRI, Mandiri..."/>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Nomor Rekening</label>
                    <input type="text" name="accountNumber"
                           th:value="${account != null ? account.accountNumber() : ''}"
                           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-400"/>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Atas Nama</label>
                    <input type="text" name="accountHolder"
                           th:value="${account != null ? account.accountHolder() : ''}"
                           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-400"/>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Nomor GoPay</label>
                    <input type="text" name="gopayNumber"
                           th:value="${account != null ? account.gopayNumber() : ''}"
                           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-400"/>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Nomor OVO</label>
                    <input type="text" name="ovoNumber"
                           th:value="${account != null ? account.ovoNumber() : ''}"
                           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-400"/>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">URL Gambar QRIS</label>
                    <input type="url" name="qrisImageUrl"
                           th:value="${account != null ? account.qrisImageUrl() : ''}"
                           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-400"/>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <a th:href="@{/admin/invitations/{id}(id=${invitationId})}"
                       class="px-4 py-2 border rounded text-sm text-gray-600 hover:bg-gray-50">Batal</a>
                    <button type="submit"
                            class="bg-rose-600 text-white px-5 py-2 rounded text-sm hover:bg-rose-700">
                        Simpan
                    </button>
                </div>
            </form>
        </div>

    </main>
</div>

</body>
</html>
