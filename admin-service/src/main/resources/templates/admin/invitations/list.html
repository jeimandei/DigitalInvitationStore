<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Daftar Undangan')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('invitations')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <h1 class="text-lg font-semibold text-gray-800">Daftar Undangan</h1>
    </header>
    <main class="flex-1 p-8">

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">Slug</th>
                    <th class="px-4 py-3 text-left">Status</th>
                    <th class="px-4 py-3 text-left">Aktif Sampai</th>
                    <th class="px-4 py-3 text-left">Dilihat</th>
                    <th class="px-4 py-3"></th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="inv : ${invitations.content()}" class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-mono text-xs" th:text="${inv.coupleSlug()}"></td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded text-xs font-medium"
                              th:classappend="${inv.status() == 'ACTIVE'} ? 'bg-green-100 text-green-700' :
                                             (${inv.status() == 'DRAFT'} ? 'bg-gray-100 text-gray-600' : 'bg-red-100 text-red-600')"
                              th:text="${inv.status()}"></span>
                    </td>
                    <td class="px-4 py-3 text-gray-500"
                        th:text="${inv.activeUntil() != null ? #temporals.format(inv.activeUntil(), 'dd MMM yyyy') : '-'}"></td>
                    <td class="px-4 py-3 text-gray-500" th:text="${inv.viewCount()}"></td>
                    <td class="px-4 py-3 flex flex-wrap gap-2">
                        <a th:href="@{/admin/invitations/{id}(id=${inv.id()})}"
                           class="text-rose-600 hover:underline text-xs">Detail</a>
                        <span class="text-gray-300">|</span>
                        <a th:href="@{/admin/invitations/{id}/rsvp(id=${inv.id()})}"
                           class="text-gray-600 hover:underline text-xs">RSVP</a>
                        <span class="text-gray-300">|</span>
                        <a th:href="@{/admin/invitations/{id}/guests(id=${inv.id()})}"
                           class="text-gray-600 hover:underline text-xs">Tamu</a>
                        <span class="text-gray-300">|</span>
                        <a th:href="@{/admin/invitations/{id}/attendance(id=${inv.id()})}"
                           class="text-gray-600 hover:underline text-xs">Kehadiran</a>
                        <span class="text-gray-300">|</span>
                        <a th:href="@{/admin/invitations/{id}/gifts(id=${inv.id()})}"
                           class="text-gray-600 hover:underline text-xs">Amplop</a>
                        <span class="text-gray-300">|</span>
                        <a th:href="@{/admin/invitations/{id}/guestbook(id=${inv.id()})}"
                           class="text-gray-600 hover:underline text-xs">Buku Tamu</a>
                    </td>
                </tr>
                <tr th:if="${invitations.content().isEmpty()}">
                    <td colspan="5" class="px-4 py-8 text-center text-gray-400">Tidak ada undangan.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-between items-center mt-4 text-sm text-gray-600" th:if="${invitations.totalPages() > 1}">
            <span th:text="'Halaman ' + (${invitations.page()} + 1) + ' dari ' + ${invitations.totalPages()}"></span>
            <div class="flex gap-2">
                <a th:if="${invitations.page() > 0}"
                   th:href="@{/admin/invitations(page=${invitations.page()-1})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Sebelumnya</a>
                <a th:if="${!invitations.last()}"
                   th:href="@{/admin/invitations(page=${invitations.page()+1})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Selanjutnya</a>
            </div>
        </div>

    </main>
</div>

</body>
</html>
