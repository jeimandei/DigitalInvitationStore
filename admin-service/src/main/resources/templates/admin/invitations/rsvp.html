<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('RSVP')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('invitations')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4 flex items-center justify-between">
        <div>
            <a th:href="@{/admin/invitations/{id}(id=${invitationId})}"
               class="text-gray-400 hover:text-gray-600 text-sm">← Detail Undangan</a>
            <h1 class="text-lg font-semibold text-gray-800 mt-1">Daftar RSVP</h1>
        </div>
        <a th:href="@{/admin/rsvp/{id}/export.csv(id=${invitationId})}"
           class="bg-gray-700 text-white px-4 py-2 rounded text-sm hover:bg-gray-800">
            Export CSV
        </a>
    </header>
    <main class="flex-1 p-8">

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">Nama Tamu</th>
                    <th class="px-4 py-3 text-left">No. HP</th>
                    <th class="px-4 py-3 text-left">Kehadiran</th>
                    <th class="px-4 py-3 text-left">Jml Tamu</th>
                    <th class="px-4 py-3 text-left">Pesan</th>
                    <th class="px-4 py-3 text-left">Waktu</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="e : ${entries}" class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium" th:text="${e.guestName()}"></td>
                    <td class="px-4 py-3 text-gray-500" th:text="${e.phone()}"></td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded text-xs font-medium"
                              th:classappend="${e.attendance() == 'HADIR'} ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'"
                              th:text="${e.attendance()}"></span>
                    </td>
                    <td class="px-4 py-3 text-gray-700" th:text="${e.guestCount()}"></td>
                    <td class="px-4 py-3 text-gray-500 max-w-xs truncate" th:text="${e.message()}"></td>
                    <td class="px-4 py-3 text-gray-400 text-xs"
                        th:text="${e.submittedAt() != null ? #temporals.format(e.submittedAt(), 'dd MMM yyyy HH:mm') : '-'}"></td>
                </tr>
                <tr th:if="${entries.isEmpty()}">
                    <td colspan="6" class="px-4 py-8 text-center text-gray-400">Belum ada RSVP.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

</body>
</html>
