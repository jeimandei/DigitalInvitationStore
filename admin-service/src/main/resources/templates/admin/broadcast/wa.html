<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Broadcast WhatsApp')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('broadcast')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <h1 class="text-lg font-semibold text-gray-800">Broadcast WhatsApp</h1>
    </header>
    <main class="flex-1 p-8 max-w-2xl">

        <div th:if="${success}" class="mb-6 bg-green-50 border border-green-200 text-green-800 rounded-lg px-4 py-3"
             th:text="${success}"></div>
        <div th:if="${error}" class="mb-6 bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3"
             th:text="${error}"></div>

        <div class="bg-white rounded-xl shadow p-6">
            <p class="text-sm text-gray-500 mb-6">
                Kirim pesan WhatsApp massal ke grup penerima yang dipilih melalui Fonnte API.
            </p>

            <form method="post" th:action="@{/admin/broadcast/wa}">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Grup Penerima</label>
                    <select name="targetGroup"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400">
                        <option value="ALL_ACTIVE">Semua undangan aktif</option>
                        <option value="EXPIRING_7D">Undangan yang akan kedaluwarsa (7 hari)</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pesan</label>
                    <textarea name="message" rows="6" required
                              placeholder="Tulis pesan WhatsApp di sini..."
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 resize-none"></textarea>
                    <p class="text-xs text-gray-400 mt-1">Mendukung format bold WhatsApp: *teks tebal*</p>
                </div>

                <button type="submit"
                        class="bg-rose-600 hover:bg-rose-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition-colors"
                        onclick="return confirm('Kirim broadcast ke semua penerima yang dipilih?')">
                    Kirim Broadcast
                </button>
            </form>
        </div>

        <!-- Test WA Section -->
        <div class="bg-white rounded-xl shadow p-6 mt-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-1">Kirim Pesan Test</h2>
            <p class="text-sm text-gray-500 mb-4">Kirim pesan ke satu nomor untuk memverifikasi koneksi Fonnte.</p>

            <div id="test-result" class="hidden mb-4 text-sm rounded-lg px-4 py-3"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nomor WhatsApp</label>
                    <input id="test-phone" type="text" placeholder="6281234567890"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400"/>
                    <p class="text-xs text-gray-400 mt-1">Format internasional tanpa +, contoh: 6281234567890</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pesan</label>
                    <textarea id="test-message" rows="4"
                              placeholder="Halo, ini pesan test dari baundang.id"
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 resize-none"></textarea>
                </div>
                <button id="test-btn" onclick="sendTestWa()"
                        class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition-colors disabled:opacity-50">
                    Kirim Test
                </button>
            </div>
        </div>

    </main>
</div>

<script>
async function sendTestWa() {
    const phone = document.getElementById('test-phone').value.trim();
    const message = document.getElementById('test-message').value.trim();
    const resultEl = document.getElementById('test-result');
    const btn = document.getElementById('test-btn');

    if (!phone || !message) {
        showResult('error', 'Nomor dan pesan wajib diisi.');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Mengirim...';
    resultEl.classList.add('hidden');

    try {
        const token = sessionStorage.getItem('admin_token');
        const res = await fetch('/api/v1/notifications/test-wa', {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {})
            },
            body: JSON.stringify({ phone, message })
        });
        const data = await res.json();
        if (!res.ok) {
            showResult('error', data.error || 'Gagal mengirim pesan.');
        } else {
            showResult('success', '✓ Pesan berhasil dikirim ke ' + data.phone);
        }
    } catch (e) {
        showResult('error', 'Terjadi kesalahan: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Kirim Test';
    }
}

function showResult(type, msg) {
    const el = document.getElementById('test-result');
    el.textContent = msg;
    el.className = type === 'success'
        ? 'mb-4 text-sm rounded-lg px-4 py-3 bg-green-50 border border-green-200 text-green-800'
        : 'mb-4 text-sm rounded-lg px-4 py-3 bg-red-50 border border-red-200 text-red-800';
    el.classList.remove('hidden');
}
</script>
</body>
</html>
