<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Login')}"></head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm px-6">
  <div class="mb-8 text-center">
    <span class="text-2xl font-bold text-rose-400">Baundang</span>
    <span class="text-gray-400 text-xl"> Admin</span>
  </div>

  <div class="bg-gray-900 rounded-2xl p-8 shadow-xl">
    <h1 class="text-lg font-semibold text-white mb-6">Masuk ke Dashboard</h1>

    <div id="error-msg" class="hidden mb-4 text-sm text-red-400 bg-red-900/30 rounded-lg px-4 py-3"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
        <input id="email" type="email" required autocomplete="username"
               class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white
                      focus:outline-none focus:ring-2 focus:ring-rose-500 placeholder-gray-500"
               placeholder="admin@baundang.id"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
        <input id="password" type="password" required autocomplete="current-password"
               class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white
                      focus:outline-none focus:ring-2 focus:ring-rose-500 placeholder-gray-500"
               placeholder="••••••••"/>
      </div>
      <button type="submit"
              class="w-full bg-rose-600 hover:bg-rose-700 text-white py-3 rounded-full text-sm font-semibold
                     transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        Masuk
      </button>
    </form>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = this.querySelector('button[type=submit]');
    const errEl = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Memproses...';
    errEl.classList.add('hidden');

    try {
      const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.message || 'Email atau password salah');
      }

      const data = await res.json();
      sessionStorage.setItem('admin_token', data.accessToken);
      sessionStorage.setItem('admin_refresh', data.refreshToken);
      // Cookie lets the gateway authenticate browser navigation requests
      document.cookie = 'admin_token=' + data.accessToken + '; path=/; SameSite=Strict';
      window.location.href = '/admin';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Masuk';
    }
  });
</script>
</body>
</html>
