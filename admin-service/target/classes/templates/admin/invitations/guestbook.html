<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Buku Tamu')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('invitations')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4 flex items-center justify-between">
        <h1 class="text-lg font-semibold text-gray-800">Buku Tamu</h1>
        <a th:href="@{/admin/rsvp/{id}/export.csv(id=${invitationId})}"
           class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded text-sm">Export RSVP CSV</a>
    </header>
    <main class="flex-1 p-8">

        <a th:href="@{/admin/invitations}" class="text-sm text-gray-500 hover:text-rose-600 mb-4 inline-block">&larr; Kembali ke Daftar Undangan</a>

        <div class="bg-white rounded-xl shadow overflow-hidden mt-4">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">Nama</th>
                    <th class="px-4 py-3 text-left">Pesan</th>
                    <th class="px-4 py-3 text-left">Status</th>
                    <th class="px-4 py-3 text-left">Waktu</th>
                    <th class="px-4 py-3"></th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="e : ${entries}" class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium" th:text="${e.guestName()}"></td>
                    <td class="px-4 py-3 text-gray-600 max-w-xs truncate" th:text="${e.message()}"></td>
                    <td class="px-4 py-3">
                        <span th:if="${e.approved()}" class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs">Disetujui</span>
                        <span th:unless="${e.approved()}" class="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-xs">Menunggu</span>
                    </td>
                    <td class="px-4 py-3 text-gray-400 text-xs"
                        th:text="${e.createdAt() != null ? #temporals.format(e.createdAt(), 'dd MMM yyyy HH:mm') : '-'}"></td>
                    <td class="px-4 py-3">
                        <form th:if="${!e.approved()}"
                              th:action="@{/admin/invitations/{iid}/guestbook/{eid}/approve(iid=${invitationId},eid=${e.id()})}"
                              method="post">
                            <button type="submit" class="text-xs text-rose-600 hover:underline">Setujui</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${entries.isEmpty()}">
                    <td colspan="5" class="px-4 py-8 text-center text-gray-400">Belum ada entri buku tamu.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

</body>
</html>
