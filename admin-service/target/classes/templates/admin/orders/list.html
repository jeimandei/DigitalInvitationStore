<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Daftar Pesanan')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('orders')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <h1 class="text-lg font-semibold text-gray-800">Daftar Pesanan</h1>
    </header>
    <main class="flex-1 p-8">

        <div class="bg-white rounded-xl shadow p-4 mb-6 flex flex-wrap gap-3 items-end">
            <form method="get" th:action="@{/admin/orders}" class="flex flex-wrap gap-3">
                <input type="text" name="search" placeholder="Cari nama / email / no. order..."
                       th:value="${currentSearch}"
                       class="border rounded px-3 py-2 text-sm w-64"/>
                <select name="status" class="border rounded px-3 py-2 text-sm">
                    <option value="" th:selected="${currentStatus == null}">Semua Status</option>
                    <option value="PENDING" th:selected="${currentStatus == 'PENDING'}">Pending</option>
                    <option value="PAID" th:selected="${currentStatus == 'PAID'}">Dibayar</option>
                    <option value="COMPLETED" th:selected="${currentStatus == 'COMPLETED'}">Selesai</option>
                    <option value="CANCELLED" th:selected="${currentStatus == 'CANCELLED'}">Dibatalkan</option>
                </select>
                <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded text-sm">Cari</button>
            </form>
            <a th:href="@{/admin/orders/export.csv(status=${currentStatus})}"
               class="ml-auto bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded text-sm">
                Export CSV
            </a>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">No. Order</th>
                    <th class="px-4 py-3 text-left">Nama</th>
                    <th class="px-4 py-3 text-left">Email</th>
                    <th class="px-4 py-3 text-left">Tier</th>
                    <th class="px-4 py-3 text-left">Status</th>
                    <th class="px-4 py-3 text-left">Tanggal</th>
                    <th class="px-4 py-3"></th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="o : ${orders.content()}" class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-mono text-xs" th:text="${o.orderNumber()}"></td>
                    <td class="px-4 py-3" th:text="${o.coupleName()}"></td>
                    <td class="px-4 py-3 text-gray-500" th:text="${o.contactEmail() ?: '-'}"></td>
                    <td class="px-4 py-3">
                        <span th:if="${o.tier() == 1}" class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs">Dasar</span>
                        <span th:if="${o.tier() == 2}" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">Standar</span>
                        <span th:if="${o.tier() == 3}" class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-xs">Premium</span>
                    </td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded text-xs font-medium"
                              th:classappend="${o.status() == 'PENDING'} ? 'bg-yellow-100 text-yellow-700' :
                                             (${o.status() == 'PAID'} ? 'bg-green-100 text-green-700' :
                                             (${o.status() == 'COMPLETED'} ? 'bg-blue-100 text-blue-700' :
                                             'bg-red-100 text-red-700'))"
                              th:text="${o.status()}"></span>
                    </td>
                    <td class="px-4 py-3 text-gray-500 text-xs"
                        th:text="${o.createdAt() != null ? #temporals.format(o.createdAt(), 'dd MMM yyyy') : '-'}"></td>
                    <td class="px-4 py-3">
                        <a th:href="@{/admin/orders/{id}(id=${o.id()})}"
                           class="text-rose-600 hover:underline text-xs">Detail</a>
                    </td>
                </tr>
                <tr th:if="${orders.content().isEmpty()}">
                    <td colspan="7" class="px-4 py-8 text-center text-gray-400">Tidak ada pesanan.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-between items-center mt-4 text-sm text-gray-600" th:if="${orders.totalPages() > 1}">
            <span th:text="'Halaman ' + (${orders.page()} + 1) + ' dari ' + ${orders.totalPages()}"></span>
            <div class="flex gap-2">
                <a th:if="${orders.page() > 0}"
                   th:href="@{/admin/orders(page=${orders.page()-1},status=${currentStatus},search=${currentSearch})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Sebelumnya</a>
                <a th:if="${!orders.last()}"
                   th:href="@{/admin/orders(page=${orders.page()+1},status=${currentStatus},search=${currentSearch})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Selanjutnya</a>
            </div>
        </div>

    </main>
</div>

</body>
</html>
