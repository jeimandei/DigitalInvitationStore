<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head th:replace="~{layout/base :: head('Daftar Template')}"></head>
<body class="bg-gray-100 min-h-screen flex">

<div th:replace="~{layout/base :: sidebar('templates')}"></div>

<div class="flex-1 flex flex-col ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
        <h1 class="text-lg font-semibold text-gray-800">Daftar Template</h1>
    </header>
    <main class="flex-1 p-8">

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">Nama</th>
                    <th class="px-4 py-3 text-left">Slug</th>
                    <th class="px-4 py-3 text-left">Kategori</th>
                    <th class="px-4 py-3 text-left">Tier</th>
                    <th class="px-4 py-3 text-left">Status</th>
                    <th class="px-4 py-3"></th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="t : ${templates.content()}" class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium" th:text="${t.name()}"></td>
                    <td class="px-4 py-3 font-mono text-xs text-gray-500" th:text="${t.slug()}"></td>
                    <td class="px-4 py-3 capitalize" th:text="${t.category()}"></td>
                    <td class="px-4 py-3">
                        <span th:if="${t.priceLevel() == 1}" class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs">Dasar</span>
                        <span th:if="${t.priceLevel() == 2}" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">Standar</span>
                        <span th:if="${t.priceLevel() == 3}" class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-xs">Premium</span>
                    </td>
                    <td class="px-4 py-3">
                        <span th:if="${t.active()}" class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs">Aktif</span>
                        <span th:unless="${t.active()}" class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-xs">Nonaktif</span>
                    </td>
                    <td class="px-4 py-3">
                        <form th:action="@{/admin/templates/{id}/toggle(id=${t.id()})}" method="post">
                            <input type="hidden" name="active" th:value="${!t.active()}"/>
                            <button type="submit" class="text-xs text-rose-600 hover:underline"
                                    th:text="${t.active() ? 'Nonaktifkan' : 'Aktifkan'}"></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${templates.content().isEmpty()}">
                    <td colspan="6" class="px-4 py-8 text-center text-gray-400">Tidak ada template.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-between items-center mt-4 text-sm text-gray-600" th:if="${templates.totalPages() > 1}">
            <span th:text="'Halaman ' + (${templates.page()} + 1) + ' dari ' + ${templates.totalPages()}"></span>
            <div class="flex gap-2">
                <a th:if="${templates.page() > 0}"
                   th:href="@{/admin/templates(page=${templates.page()-1})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Sebelumnya</a>
                <a th:if="${!templates.last()}"
                   th:href="@{/admin/templates(page=${templates.page()+1})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50">Selanjutnya</a>
            </div>
        </div>

    </main>
</div>

</body>
</html>
