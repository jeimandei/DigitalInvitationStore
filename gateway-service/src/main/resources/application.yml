spring:
  application:
    name: gateway-service
  config:
    import: "configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888"

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 200
            redis-rate-limiter.burstCapacity: 400
            key-resolver: "#{@ipKeyResolver}"

      routes:

        - id: invitation-viewer
          uri: http://invitation-service:8084
          predicates:
            - Path=/i/{slug}/**
          filters:
            - RewritePath=/i/(?<slug>.*), /api/v1/invitations/${slug}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 60
                key-resolver: "#{@ipKeyResolver}"

        - id: template-service
          uri: http://template-service:8083
          predicates:
            - Path=/api/v1/templates/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: order-service
          uri: http://order-service:8085
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtAuth

        - id: payment-service
          uri: http://payment-service:8086
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - JwtAuth

        - id: media-service
          uri: http://media-service:8089
          predicates:
            - Path=/api/v1/media/**
          filters:
            - JwtAuth

        - id: admin-service
          uri: http://admin-service:8088
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - "JwtAuth=ROLE_ADMIN"

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  auth:
    public-key-uri: http://auth-service:8081/api/v1/auth/public-key
