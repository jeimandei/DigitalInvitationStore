version: "3.9"

networks:
  backend-net:
    internal: true

volumes:
  postgres-data:
  minio-data:
  rabbitmq-data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    # Raise max_connections to 200 (9 services × pool-size 5 = 45 active, headroom for spikes)
    command: postgres -N 200
    environment:
      POSTGRES_DB: baundang
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [backend-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d baundang"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-baundang}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Platform ──────────────────────────────────────────────────────────────

  config-server:
    build:
      context: ./config-server
      dockerfile: Containerfile
    environment:
      SERVER_PORT: 8888
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:-file:///config-repo}
      CONFIG_GIT_DEFAULT_LABEL: ${CONFIG_GIT_DEFAULT_LABEL:-main}
      SPRING_SECURITY_USER_NAME: ${CONFIG_SERVER_USER}
      SPRING_SECURITY_USER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    ports:
      - "8888:8888"
    networks: [backend-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10

  auth:
    build:
      context: ./auth-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=auth
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  storefront:
    build:
      context: ./storefront-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
    ports:
      - "8082:8082"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy

  template:
    build:
      context: ./template-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=template
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8083:8083"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  invitation:
    build:
      context: ./invitation-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=invitation
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8084:8084"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order:
    build:
      context: ./order-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=orders
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8085:8085"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment:
    build:
      context: ./payment-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=payment
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
    ports:
      - "8086:8086"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification:
    build:
      context: ./notification-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=notification
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    ports:
      - "8087:8087"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  admin:
    build:
      context: ./admin-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=admin
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8088:8088"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  media:
    build:
      context: ./media-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=media
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8089:8089"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8080:8080"
    networks: [backend-net]
    depends_on:
      config-server:
        condition: service_healthy
      auth:
        condition: service_started
      storefront:
        condition: service_started
      template:
        condition: service_started
      invitation:
        condition: service_started
      order:
        condition: service_started
      payment:
        condition: service_started
      notification:
        condition: service_started
      admin:
        condition: service_started
      media:
        condition: service_started
