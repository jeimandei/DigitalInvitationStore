  payment-service:
    container_name: baundang-payment-service
    image: baundang/payment-service
    build:
      context: ./payment-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=payment
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
    ports:
      - "1086:1086"
    volumes:
      - ./logs/payment-service:/app/logs/payment-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1086/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_started

  notification-service:
    container_name: baundang-notification-service
    image: baundang/notification-service
    build:
      context: ./notification-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=notification
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    ports:
      - "1087:1087"
    volumes:
      - ./logs/notification-service:/app/logs/notification-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1087/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_started

  admin-service:
    container_name: baundang-admin-service
    image: baundang/admin-service
    build:
      context: ./admin-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=admin
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "1088:1088"
    volumes:
      - ./logs/admin-service:/app/logs/admin-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1088/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started

  media-service:
    container_name: baundang-media-service
    image: baundang/media-service
    build:
      context: ./media-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "1089:1089"
    volumes:
      - ./logs/media-service:/app/logs/media-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1089/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      minio:
        condition: service_started

  gateway:
    container_name: baundang-gateway
    image: baundang/gateway
    build:
      context: ./gateway-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "1080:1080"
    volumes:
      - ./logs/gateway-service:/app/logs/gateway-service
    security_opt:
      - label=disable
    networks: [baundang-network, public]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_started
      storefront-service:
        condition: service_started
      template-service:
        condition: service_started
      invitation-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      admin-service:
        condition: service_started
      media-service:
        condition: service_started
