version: "3.9"

networks:
  baundang-network:
    external: true
  public:
    external: true

volumes:
  postgres-data:
  minio-data:
  rabbitmq-data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    # Raise max_connections to 200 (9 services × pool-size 5 = 45 active, headroom for spikes)
    command: postgres -N 200
    environment:
      POSTGRES_DB: baundang
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d baundang"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-baundang}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Platform ──────────────────────────────────────────────────────────────

  config-server:
    build:
      context: ./config-server
      dockerfile: Containerfile
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:///config-repo
      SPRING_SECURITY_USER_NAME: ${CONFIG_SERVER_USER}
      SPRING_SECURITY_USER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "8888:8888"
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  auth:
    build:
      context: ./auth-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=auth
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    volumes:
      - ./logs/auth-service:/app/logs/auth-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  storefront:
    build:
      context: ./storefront-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
    ports:
      - "8082:8082"
    volumes:
      - ./logs/storefront-service:/app/logs/storefront-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy

  template:
    build:
      context: ./template-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=template
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8083:8083"
    volumes:
      - ./logs/template-service:/app/logs/template-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  invitation:
    build:
      context: ./invitation-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=invitation
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
    ports:
      - "8084:8084"
    volumes:
      - ./logs/invitation-service:/app/logs/invitation-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order:
    build:
      context: ./order-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=orders
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8085:8085"
    volumes:
      - ./logs/order-service:/app/logs/order-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment:
    build:
      context: ./payment-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=payment
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
    ports:
      - "8086:8086"
    volumes:
      - ./logs/payment-service:/app/logs/payment-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification:
    build:
      context: ./notification-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=notification
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    ports:
      - "8087:8087"
    volumes:
      - ./logs/notification-service:/app/logs/notification-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  admin:
    build:
      context: ./admin-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=admin
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8088:8088"
    volumes:
      - ./logs/admin-service:/app/logs/admin-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  media:
    build:
      context: ./media-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8089:8089"
    volumes:
      - ./logs/media-service:/app/logs/media-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      minio:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://${CONFIG_SERVER_USER}:${CONFIG_SERVER_PASSWORD}@config-server:8888
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./logs/gateway-service:/app/logs/gateway-service
    security_opt:
      - label=disable
    networks: [baundang-network, public]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      auth:
        condition: service_healthy
      storefront:
        condition: service_healthy
      template:
        condition: service_healthy
      invitation:
        condition: service_healthy
      order:
        condition: service_healthy
      payment:
        condition: service_healthy
      notification:
        condition: service_healthy
      admin:
        condition: service_healthy
      media:
        condition: service_healthy
