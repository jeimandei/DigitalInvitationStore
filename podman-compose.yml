version: "3.9"

networks:
  baundang-network:
    external: true
  public:
    external: true

volumes:
  postgres-data:
  minio-data:
  rabbitmq-data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    container_name: baundang-postgres
    image: docker.io/postgres:16-alpine
    # Raise max_connections to 200 (9 services × pool-size 5 = 45 active, headroom for spikes)
    command: postgres -N 200
    environment:
      POSTGRES_DB: baundang
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d baundang"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: baundang-redis
    image: docker.io/redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    container_name: baundang-rabbitmq
    image: docker.io/rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-baundang}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-baundang-secret-cookie}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    container_name: baundang-minio
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Platform ──────────────────────────────────────────────────────────────

  config-server:
    container_name: baundang-config-server
    image: baundang/config-server
    build:
      context: ./config-server
      dockerfile: Containerfile
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:///config-repo
      SPRING_SECURITY_USER_NAME: ${CONFIG_SERVER_USER}
      SPRING_SECURITY_USER_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "8888:8888"
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 10

  auth-service:
    container_name: baundang-auth-service
    image: baundang/auth-service
    build:
      context: ./auth-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=auth
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "1081:1081"
    volumes:
      - ./logs/auth-service:/app/logs/auth-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  storefront-service:
    container_name: baundang-storefront-service
    image: baundang/storefront-service
    build:
      context: ./storefront-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
    ports:
      - "1082:1082"
    volumes:
      - ./logs/storefront-service:/app/logs/storefront-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy

  template-service:
    container_name: baundang-template-service
    image: baundang/template-service
    build:
      context: ./template-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=template
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "1083:1083"
    volumes:
      - ./logs/template-service:/app/logs/template-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started
      minio:
        condition: service_started

  invitation-service:
    container_name: baundang-invitation-service
    image: baundang/invitation-service
    build:
      context: ./invitation-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=invitation
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
    ports:
      - "1084:1084"
    volumes:
      - ./logs/invitation-service:/app/logs/invitation-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  order-service:
    container_name: baundang-order-service
    image: baundang/order-service
    build:
      context: ./order-service
      dockerfile: Containerfile
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_USERNAME: ${CONFIG_SERVER_USER}
      SPRING_CLOUD_CONFIG_PASSWORD: ${CONFIG_SERVER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/baundang?currentSchema=orders
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "1085:1085"
    volumes:
      - ./logs/order-service:/app/logs/order-service
    security_opt:
      - label=disable
    networks: [baundang-network]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1085/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      config-server:
        condition: service_healthy
