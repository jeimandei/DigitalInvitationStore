<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title th:text="'Scanner Check-in — ' + ${coupleName}">Scanner Check-in</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --rose:#e11d48; --rose-d:#be123c; --bg:#1c1917; --panel:#292524; --line:#44403c; --txt:#fafaf9; --muted:#a8a29e; }
        html, body { height:100%; background:var(--bg); color:var(--txt); font-family:system-ui,-apple-system,sans-serif; }
        body { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:2rem 1rem; min-height:100%; }
        .wrap { width:100%; max-width:420px; }
        .head { text-align:center; margin-bottom:1.5rem; }
        .head .label { font-size:.8rem; color:var(--muted); margin-bottom:.25rem; }
        .head h1 { font-size:1.5rem; font-weight:700; }
        /* Let html5-qrcode control the video — do NOT override its size/object-fit
           or the canvas coordinate space diverges from the preview. */
        #reader { width:100%; border-radius:14px; overflow:hidden; background:#000; min-height:120px; }
        #reader img { display:none !important; }
        #reader div[style*="border"] { border:none !important; box-shadow:none !important; }
        #status { text-align:center; font-size:.85rem; color:var(--muted); margin-top:1rem; }
        #error-box { display:none; margin-top:1rem; background:rgba(190,18,60,.18); color:#fda4af; font-size:.85rem; border-radius:12px; padding:.75rem 1rem; text-align:center; }
        #error-box.show { display:block; }
        button, .btn { width:100%; border:none; border-radius:999px; padding:.85rem; font-size:.85rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .btn-primary { background:var(--rose); color:#fff; margin-top:1.25rem; }
        .btn-primary:hover { background:var(--rose-d); }
        .btn-outline { background:transparent; color:var(--muted); border:1px solid var(--line); margin-top:.75rem; display:none; }
        .btn-outline.show { display:block; }
        .btn-gray { background:var(--panel); color:#fff; display:block; text-align:center; }
        .file-wrap { margin-top:1.5rem; }
        .file-wrap p { text-align:center; font-size:.72rem; color:var(--muted); margin-top:.5rem; }
        .manual { margin-top:2rem; border-top:1px solid var(--line); padding-top:1.5rem; }
        .manual p { text-align:center; font-size:.72rem; color:var(--muted); margin-bottom:.75rem; }
        .manual .row { display:flex; gap:.5rem; }
        .manual input { flex:1; background:var(--panel); border:1px solid var(--line); color:#fff; border-radius:10px; padding:.6rem .9rem; font-size:.85rem; outline:none; }
        .manual input:focus { border-color:var(--rose); }
        .manual button { width:auto; background:var(--panel); padding:.6rem 1rem; border-radius:10px; }
        details { margin-top:1.5rem; }
        summary { color:#57534e; font-size:.72rem; cursor:pointer; }
        #diag { margin-top:.5rem; background:rgba(0,0,0,.4); color:var(--muted); font-size:10px; line-height:1.5; border-radius:8px; padding:.75rem; white-space:pre-wrap; word-break:break-all; max-height:12rem; overflow:auto; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="head">
        <p class="label">Scanner Check-in</p>
        <h1 th:text="${coupleName}">Nama Pasangan</h1>
    </div>

    <div id="reader"></div>

    <div id="status">Tekan tombol di bawah untuk mulai memindai</div>
    <div id="error-box"></div>

    <button id="start-btn" class="btn-primary">Mulai Scan</button>
    <button id="stop-btn" class="btn-outline">Hentikan</button>

    <div class="file-wrap">
        <label for="qr-file" class="btn btn-gray">Pindai dari Foto</label>
        <input id="qr-file" type="file" accept="image/*" capture="environment" style="display:none"/>
        <p>Ambil foto QR atau pilih dari galeri (lebih akurat saat kamera sulit fokus)</p>
    </div>

    <div class="manual">
        <p>Atau masukkan kode undangan manual:</p>
        <div class="row">
            <input id="manual-code" type="text" placeholder="Kode undangan"/>
            <button id="manual-go">Buka</button>
        </div>
    </div>

    <details>
        <summary>Log diagnostik</summary>
        <pre id="diag"></pre>
    </details>
</div>

<script>
    (function () {
        var diagEl = document.getElementById('diag');
        window.__log = function (msg) {
            try {
                var line = '[' + new Date().toLocaleTimeString() + '] ' + msg;
                if (diagEl) diagEl.textContent += line + '\n';
                if (window.console) console.log(line);
            } catch (e) {}
        };
        window.addEventListener('error', function (e) {
            window.__log('JS ERROR: ' + (e.message || e.error || e));
        });
        window.__log('Halaman dimuat. secureContext=' + window.isSecureContext +
            ', Html5Qrcode=' + (typeof Html5Qrcode !== 'undefined'));
    })();
</script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var slug = /*[[${slug}]]*/ '';
    var origin = window.location.origin;
    var lastScanned = '';
    var scanning = true;
    var scanner = null;
    var running = false;

    var statusEl = document.getElementById('status');
    var errorEl = document.getElementById('error-box');
    var startBtn = document.getElementById('start-btn');
    var stopBtn = document.getElementById('stop-btn');

    window.__log('Skrip utama jalan. slug=' + slug + ' origin=' + origin);

    function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); }
    function clearError() { errorEl.classList.remove('show'); }
    function setStatus(msg) { statusEl.textContent = msg; }
    function checkinUrlFor(code) { return origin + '/i/' + slug + '/checkin/' + encodeURIComponent(code); }

    var SCAN_CONFIG = {
        fps: 10,
        qrbox: function (w, h) { var s = Math.round(Math.min(w, h) * 0.8); return { width: s, height: s }; }
    };

    function onScanSuccess(text) {
        if (!scanning) return;
        var decoded = ('' + text).trim();
        if (decoded === lastScanned) return;
        lastScanned = decoded;
        scanning = false;
        window.__log('Scan: ' + decoded);

        var target = decoded;
        var prefix = origin + '/i/' + slug + '/checkin/';
        if (target.indexOf(prefix) === 0) {
            // full URL — use as-is
        } else if (/^[A-Za-z0-9_-]+$/.test(target)) {
            target = checkinUrlFor(target);
        } else {
            try {
                var u = new URL(decoded);
                var q = u.searchParams.get('code') || u.searchParams.get('id');
                if (q) { target = checkinUrlFor(q); } else { throw new Error('no code'); }
            } catch (_) {
                showError('QR Code tidak dikenali.');
                setTimeout(function () { scanning = true; lastScanned = ''; clearError(); }, 2000);
                return;
            }
        }

        clearError();
        setStatus('QR ditemukan, membuka halaman check-in...');
        stopScanner().then(function () { window.location.href = target; });
    }

    function startScanner() {
        clearError();
        window.__log('Tombol Mulai Scan ditekan.');
        if (typeof Html5Qrcode === 'undefined') { showError('Gagal memuat pustaka pemindai.'); return; }
        if (!window.isSecureContext) { showError('Kamera hanya bisa diakses lewat HTTPS.'); return; }

        scanner = new Html5Qrcode('reader');
        setStatus('Meminta izin kamera...');
        startBtn.disabled = true;
        window.__log('start() facingMode=environment...');

        scanner.start({ facingMode: 'environment' }, SCAN_CONFIG, onScanSuccess, function () {})
            .then(onStarted)
            .catch(function (err) {
                window.__log('environment gagal: ' + err + ' — coba kamera depan');
                scanner = new Html5Qrcode('reader');
                scanner.start({ facingMode: 'user' }, SCAN_CONFIG, onScanSuccess, function () {})
                    .then(onStarted)
                    .catch(function (err2) {
                        startBtn.disabled = false;
                        setStatus('');
                        var m = '' + err2;
                        if (m.indexOf('NotAllowedError') !== -1 || m.indexOf('Permission') !== -1) {
                            showError('Izin kamera ditolak. Aktifkan izin kamera untuk situs ini lalu coba lagi.');
                        } else if (m.indexOf('NotFoundError') !== -1) {
                            showError('Kamera tidak ditemukan di perangkat ini.');
                        } else {
                            showError('Tidak dapat mengakses kamera: ' + m);
                        }
                        window.__log('start() GAGAL total: ' + m);
                    });
            });
    }

    function onStarted() {
        running = true;
        scanning = true;
        startBtn.disabled = false;
        startBtn.style.display = 'none';
        stopBtn.classList.add('show');
        setStatus('Arahkan kamera ke QR Code tamu');
        window.__log('Kamera berjalan.');
    }

    function stopScanner() {
        if (scanner && running) {
            running = false;
            return scanner.stop().then(function () {
                stopBtn.classList.remove('show');
                startBtn.style.display = 'block';
            }).catch(function () {});
        }
        return Promise.resolve();
    }

    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', function () {
        stopScanner();
        setStatus('Pemindaian dihentikan. Tekan Mulai Scan untuk melanjutkan.');
    });

    document.getElementById('qr-file').addEventListener('change', function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        clearError();
        setStatus('Memindai foto...');
        window.__log('Memindai dari file: ' + file.name);
        var fileScanner = new Html5Qrcode('reader');
        var doScan = function () {
            fileScanner.scanFile(file, false).then(function (decodedText) {
                window.__log('File decoded: ' + decodedText);
                scanning = true;
                onScanSuccess(decodedText);
            }).catch(function (err) {
                window.__log('scanFile GAGAL: ' + err);
                showError('Tidak menemukan QR pada foto. Pastikan QR terlihat jelas dan coba lagi.');
                setStatus('');
            }).finally(function () {
                try { fileScanner.clear(); } catch (x) {}
                e.target.value = '';
            });
        };
        if (running) { stopScanner().then(doScan); } else { doScan(); }
    });

    document.getElementById('manual-go').addEventListener('click', function () {
        var code = document.getElementById('manual-code').value.trim();
        if (!code) return;
        window.location.href = checkinUrlFor(code);
    });
    document.getElementById('manual-code').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('manual-go').click();
    });

    window.__log('Handler tombol terpasang. Siap.');
    /*]]>*/
</script>
</body>
</html>
