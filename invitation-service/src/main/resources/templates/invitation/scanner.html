<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Scanner Check-in — ' + ${coupleName}">Scanner Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-stone-900 min-h-screen flex flex-col items-center justify-center px-4 py-8">

<div class="w-full max-w-sm">
    <div class="text-center mb-6">
        <p class="text-stone-400 text-sm mb-1">Scanner Check-in</p>
        <h1 class="text-white text-xl font-bold" th:text="${coupleName}">Nama Pasangan</h1>
    </div>

    <div id="reader" class="w-full rounded-2xl overflow-hidden bg-black min-h-[120px]"></div>

    <div id="status" class="mt-4 text-center text-sm text-stone-400">
        Tekan tombol di bawah untuk mulai memindai
    </div>

    <div id="error-box" class="hidden mt-4 bg-red-900/50 text-red-300 text-sm rounded-xl px-4 py-3 text-center"></div>

    <button id="start-btn"
            class="mt-5 w-full bg-rose-600 text-white py-3 rounded-full text-sm font-semibold hover:bg-rose-700 transition">
        Mulai Scan
    </button>
    <button id="stop-btn"
            class="hidden mt-3 w-full border border-stone-600 text-stone-300 py-3 rounded-full text-sm font-semibold hover:bg-stone-800 transition">
        Hentikan
    </button>

    <!-- Photo fallback: take a photo / pick an image and decode it -->
    <div class="mt-6">
        <label for="qr-file"
               class="block text-center bg-stone-700 text-white py-3 rounded-full text-sm font-semibold hover:bg-stone-600 cursor-pointer transition">
            Pindai dari Foto
        </label>
        <input id="qr-file" type="file" accept="image/*" capture="environment" class="hidden"/>
        <p class="text-stone-500 text-xs text-center mt-2">Ambil foto QR atau pilih dari galeri (lebih akurat saat kamera sulit fokus)</p>
    </div>

    <!-- Manual fallback -->
    <div class="mt-8 border-t border-stone-700 pt-6">
        <p class="text-stone-500 text-xs text-center mb-3">Atau masukkan kode undangan manual:</p>
        <div class="flex gap-2">
            <input id="manual-code" type="text" placeholder="Kode undangan"
                   class="flex-1 bg-stone-800 border border-stone-700 text-white rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-500"/>
            <button id="manual-go"
                    class="bg-stone-700 text-white px-4 py-2 rounded-xl text-sm hover:bg-stone-600">
                Buka
            </button>
        </div>
    </div>

    <!-- Diagnostic log (collapsible) -->
    <details class="mt-6">
        <summary class="text-stone-600 text-xs cursor-pointer">Log diagnostik</summary>
        <pre id="diag" class="mt-2 bg-black/40 text-stone-400 text-[10px] leading-relaxed rounded-lg p-3 whitespace-pre-wrap break-all max-h-48 overflow-auto"></pre>
    </details>
</div>

<script>
    // Plain (non-Thymeleaf) bootstrap so even a template-inlining problem can't kill logging.
    (function () {
        var diagEl = document.getElementById('diag');
        window.__log = function (msg) {
            try {
                var line = '[' + new Date().toLocaleTimeString() + '] ' + msg;
                if (diagEl) diagEl.textContent += line + '\n';
                if (window.console) console.log(line);
            } catch (e) {}
        };
        window.addEventListener('error', function (e) {
            window.__log('JS ERROR: ' + (e.message || e.error || e) + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
            var box = document.getElementById('error-box');
            if (box) { box.textContent = 'Terjadi error skrip — lihat Log diagnostik di bawah.'; box.classList.remove('hidden'); }
        });
        window.addEventListener('unhandledrejection', function (e) {
            window.__log('PROMISE REJECTED: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
        });
        window.__log('Halaman dimuat. secureContext=' + window.isSecureContext +
            ', mediaDevices=' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) +
            ', Html5Qrcode=' + (typeof Html5Qrcode !== 'undefined'));
    })();
</script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var slug = /*[[${slug}]]*/ '';
    var origin = window.location.origin;
    var lastScanned = '';
    var cooldown = false;
    var html5QrCode = null;
    var running = false;

    var statusEl = document.getElementById('status');
    var errorEl = document.getElementById('error-box');
    var startBtn = document.getElementById('start-btn');
    var stopBtn = document.getElementById('stop-btn');

    window.__log('Skrip utama jalan. slug=' + slug + ' origin=' + origin);

    function showError(msg) { errorEl.textContent = msg; errorEl.classList.remove('hidden'); }
    function clearError() { errorEl.classList.add('hidden'); }
    function setStatus(msg) { statusEl.textContent = msg; }
    function checkinUrlFor(code) { return origin + '/i/' + slug + '/checkin/' + encodeURIComponent(code); }

    function onScanSuccess(decodedText) {
        if (cooldown || decodedText === lastScanned) return;
        lastScanned = decodedText;
        cooldown = true;
        window.__log('Scan: ' + decodedText);

        var target = ('' + decodedText).trim();
        var expectedPrefix = origin + '/i/' + slug + '/checkin/';

        if (target.indexOf(expectedPrefix) === 0) {
            // full URL — use as-is
        } else if (/^[A-Za-z0-9_-]+$/.test(target)) {
            target = checkinUrlFor(target);
        } else {
            showError('QR Code tidak valid untuk undangan ini.');
            window.__log('QR ditolak (bukan untuk undangan ini).');
            setTimeout(function () { cooldown = false; lastScanned = ''; }, 2500);
            return;
        }

        clearError();
        setStatus('QR ditemukan, membuka halaman check-in...');
        stopScanner().then(function () { window.location.href = target; });
    }

    function startScanner() {
        clearError();
        window.__log('Tombol Mulai Scan ditekan.');

        if (typeof Html5Qrcode === 'undefined') {
            showError('Gagal memuat pustaka pemindai. Periksa koneksi internet lalu muat ulang.');
            window.__log('Html5Qrcode tidak terdefinisi — pustaka gagal dimuat.');
            return;
        }
        if (!window.isSecureContext) {
            showError('Kamera hanya bisa diakses lewat HTTPS.');
            window.__log('Bukan secure context.');
            return;
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showError('Browser ini tidak mendukung akses kamera.');
            window.__log('mediaDevices.getUserMedia tidak tersedia.');
            return;
        }

        if (!html5QrCode) {
            // verbose:false; enable native BarcodeDetector when the browser supports it
            html5QrCode = new Html5Qrcode('reader', {
                verbose: false,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            });
        }
        setStatus('Meminta izin kamera...');
        startBtn.disabled = true;
        window.__log('Memanggil html5QrCode.start()...');

        // Adaptive scan box: ~80% of the smaller viewfinder dimension, so the
        // whole visible QR is inside the decode region regardless of phone size.
        function qrboxFn(vfW, vfH) {
            var size = Math.floor(Math.min(vfW, vfH) * 0.8);
            return { width: size, height: size };
        }

        // NOTE: html5-qrcode requires the first arg to have exactly ONE key.
        // HD resolution + continuous focus are applied to the track AFTER start.
        html5QrCode.start(
            { facingMode: 'environment' },
            { fps: 15, qrbox: qrboxFn, aspectRatio: 1.777, disableFlip: false },
            onScanSuccess,
            function () { /* per-frame misses */ }
        ).then(function () {
            running = true;
            startBtn.disabled = false;
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            setStatus('Arahkan kamera ke QR Code tamu');
            window.__log('Kamera berjalan. Mendeteksi... arahkan QR ke dalam kotak.');

            // Upgrade the live track to HD + continuous focus AFTER start (start
            // itself only accepts a single-key constraint). This sharpens dense
            // QRs that the default low-res stream renders as an unreadable blur.
            try {
                var video = document.querySelector('#reader video');
                if (video && video.srcObject) {
                    var track = video.srcObject.getVideoTracks()[0];
                    if (track) {
                        var logSettings = function (tag) {
                            var s = track.getSettings ? track.getSettings() : {};
                            window.__log(tag + ' ' + (s.width || '?') + 'x' + (s.height || '?') +
                                ' focusMode=' + (s.focusMode || 'n/a'));
                        };
                        logSettings('Resolusi awal:');

                        var caps = track.getCapabilities ? track.getCapabilities() : {};
                        var advanced = [];
                        if (caps.focusMode && caps.focusMode.indexOf('continuous') !== -1) {
                            advanced.push({ focusMode: 'continuous' });
                        }
                        var wanted = {
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        };
                        if (advanced.length) wanted.advanced = advanced;

                        track.applyConstraints(wanted)
                            .then(function () { logSettings('Resolusi setelah upgrade:'); })
                            .catch(function (ae) { window.__log('applyConstraints gagal (lanjut pakai default): ' + ae); });
                    }
                }
            } catch (fx) { window.__log('Tidak bisa baca info video: ' + fx); }
            // Heartbeat so we can confirm scanning is actively running
            var beats = 0;
            var hb = setInterval(function () {
                if (!running) { clearInterval(hb); return; }
                beats++;
                if (beats <= 6) window.__log('Memindai... (' + beats + ')');
                else clearInterval(hb);
            }, 2000);
        }).catch(function (err) {
            startBtn.disabled = false;
            setStatus('');
            var m = (err && err.toString ? err.toString() : String(err));
            window.__log('start() GAGAL: ' + m);
            if (m.indexOf('NotAllowedError') !== -1 || m.indexOf('Permission') !== -1) {
                showError('Izin kamera ditolak. Aktifkan izin kamera untuk situs ini lalu coba lagi.');
            } else if (m.indexOf('NotFoundError') !== -1) {
                showError('Kamera tidak ditemukan di perangkat ini.');
            } else {
                showError('Tidak dapat mengakses kamera: ' + m);
            }
        });
    }

    function stopScanner() {
        if (html5QrCode && running) {
            running = false;
            return html5QrCode.stop().then(function () {
                stopBtn.classList.add('hidden');
                startBtn.classList.remove('hidden');
            }).catch(function () {});
        }
        return Promise.resolve();
    }

    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', function () {
        stopScanner();
        setStatus('Pemindaian dihentikan. Tekan Mulai Scan untuk melanjutkan.');
    });

    // Scan from a photo / picked image — autofocus on capture makes this reliable
    document.getElementById('qr-file').addEventListener('change', function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        clearError();
        setStatus('Memindai foto...');
        window.__log('Memindai dari file: ' + file.name);

        var scanner = html5QrCode;
        var freshlyMade = false;
        if (!scanner) {
            scanner = new Html5Qrcode('reader', { verbose: false });
            freshlyMade = true;
        }

        var doScan = function () {
            scanner.scanFile(file, false).then(function (decodedText) {
                window.__log('File decoded: ' + decodedText);
                onScanSuccess(decodedText);
            }).catch(function (err) {
                var m = (err && err.toString ? err.toString() : String(err));
                window.__log('scanFile GAGAL: ' + m);
                showError('Tidak menemukan QR pada foto. Pastikan QR terlihat jelas dan coba lagi.');
                setStatus('');
            }).finally(function () {
                if (freshlyMade) { try { scanner.clear(); } catch (x) {} }
                e.target.value = '';
            });
        };

        // scanFile cannot run while live camera is active — stop it first
        if (running) { stopScanner().then(doScan); } else { doScan(); }
    });

    document.getElementById('manual-go').addEventListener('click', function () {
        var code = document.getElementById('manual-code').value.trim();
        if (!code) return;
        window.location.href = checkinUrlFor(code);
    });
    document.getElementById('manual-code').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('manual-go').click();
    });

    window.__log('Handler tombol terpasang. Siap.');
    /*]]>*/
</script>
</body>
</html>
