<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragment: venue-map
  Usage in parent template:
    <div th:replace="~{fragments/venue-map :: venue-map(${events})}"></div>
  Or loaded via HTMX from GET /api/v1/invitations/{slug}/events rendered by a dedicated endpoint.
-->
<section th:fragment="venue-map(events)"
         th:if="${events != null and !#lists.isEmpty(events)}"
         class="venue-section">

    <style>
        .venue-section { padding: 5rem 1.5rem; background: #f5f0ea; }
        .venue-section-inner { max-width: 720px; margin: 0 auto; text-align: center; }
        .venue-section h2 { font-family: 'Playfair Display', serif; font-size: 1.75rem; color: #2d4a3e; margin-bottom: .5rem; }
        .venue-ornament { color: #c9a96e; font-size: 1.4rem; margin: .75rem 0 2rem; }

        .venue-cards { display: grid; gap: 2rem; }
        @media (min-width: 640px) {
            .venue-cards { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        }

        .venue-card { background: #fff; border: 1px solid #e2d9cc; text-align: left; overflow: hidden; }
        .venue-card-body { padding: 1.5rem; }
        .venue-card-event-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; color: #2d4a3e;
            margin-bottom: .75rem; letter-spacing: .02em;
        }
        .venue-card-meta { font-size: .875rem; color: #5a3e30; line-height: 1.7; margin-bottom: .5rem; }
        .venue-card-meta span { display: block; }
        .venue-card-meta .label {
            font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
            color: #9e8678; margin-top: .6rem; margin-bottom: .1rem;
        }
        .dress-code-badge {
            display: inline-block; margin-top: .75rem;
            padding: .25rem .75rem; background: #f5ede0;
            border: 1px solid #d6c4a8; font-size: .78rem;
            color: #5a3e30; letter-spacing: .05em;
        }

        .venue-map-frame { width: 100%; height: 220px; border: 0; display: block; }

        .btn-maps {
            display: flex; align-items: center; justify-content: center; gap: .5rem;
            margin: 1rem 1.5rem 1.5rem;
            padding: .7rem 1.5rem;
            background: #2d4a3e; color: #f5ede0;
            font-size: .85rem; letter-spacing: .08em;
            text-decoration: none; transition: background .25s;
        }
        .btn-maps:hover { background: #1a2e26; color: #f5ede0; }
        .btn-maps svg { flex-shrink: 0; }
    </style>

    <div class="venue-section-inner">
        <p class="venue-ornament">📍</p>
        <h2>Lokasi Acara</h2>

        <div class="venue-cards" style="margin-top: 2rem;">
            <div th:each="event : ${events}" class="venue-card">

                <div class="venue-card-body">
                    <p class="venue-card-event-name" th:text="${event.name()}">Nama Acara</p>

                    <div class="venue-card-meta">
                        <span class="label">Tanggal &amp; Waktu</span>
                        <span th:text="${event.date()}">Tanggal</span>
                        <span th:if="${!#strings.isEmpty(event.time())}"
                              th:text="${event.time()}">Waktu</span>

                        <span class="label">Tempat</span>
                        <span th:text="${event.venueName()}">Nama Tempat</span>
                        <span th:if="${!#strings.isEmpty(event.venueAddress())}"
                              th:text="${event.venueAddress()}"
                              style="font-size:.82rem; color:#9e8678"></span>
                    </div>

                    <span th:if="${!#strings.isEmpty(event.dressCode())}" class="dress-code-badge">
                        👗 <span th:text="${event.dressCode()}">Dress Code</span>
                    </span>
                </div>

                <!-- Google Maps embed (no API key required for basic embed) -->
                <th:block th:if="${event.hasCoordinates()}">
                    <iframe class="venue-map-frame"
                            th:src="${event.mapsEmbedUrl()}"
                            allowfullscreen
                            loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"
                            title="Peta lokasi acara">
                    </iframe>

                    <a th:href="${event.mapsDirectUrl()}"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="btn-maps">
                        <!-- inline map-pin SVG — no external icon dependency -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        Buka di Google Maps
                    </a>
                </th:block>

            </div><!-- /venue-card -->
        </div><!-- /venue-cards -->
    </div><!-- /inner -->
</section>

</body>
</html>
