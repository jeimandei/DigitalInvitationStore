name: CD — Baundang Digital Invitation Store

on:
  workflow_dispatch:
    inputs:
      action:
        description: >
          Action to perform:
          full-deploy       = git pull + mvn package + podman compose up --build (all services),
          build-service     = rebuild + restart specific service(s),
          restart-service   = restart specific service(s) without rebuild,
          restart-all       = restart every running container,
          deploy-config     = sync config-repo/ to server and refresh config server,
          deploy-env        = push .env from ENV_FILE secret to server
        required: true
        type: choice
        options:
          - full-deploy
          - build-service
          - restart-service
          - restart-all
          - deploy-config
          - deploy-env

      svc_config_server:
        description: 'config-server'
        type: boolean
        default: false
      svc_auth:
        description: 'auth-service'
        type: boolean
        default: false
      svc_storefront:
        description: 'storefront-service'
        type: boolean
        default: false
      svc_template:
        description: 'template-service'
        type: boolean
        default: false
      svc_invitation:
        description: 'invitation-service'
        type: boolean
        default: false
      svc_order:
        description: 'order-service'
        type: boolean
        default: false
      svc_payment:
        description: 'payment-service'
        type: boolean
        default: false
      svc_notification:
        description: 'notification-service'
        type: boolean
        default: false
      svc_admin:
        description: 'admin-service'
        type: boolean
        default: false
      svc_media:
        description: 'media-service'
        type: boolean
        default: false
      svc_gateway:
        description: 'gateway'
        type: boolean
        default: false

      services:
        description: >
          (restart-service only) Space-separated service name(s).
          For build-service use the checkboxes above.
        required: false
        type: string
        default: ''

      branch:
        description: 'Git branch to deploy from'
        required: false
        type: string
        default: 'main'

# Prevent concurrent deploys — queue rather than cancel
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  DEPLOY_DIR: ${{ secrets.SSH_PATH }}
  SSH_HOST:   ${{ secrets.SSH_URL }}
  SSH_PORT:   ${{ secrets.SSH_PORT }}
  SSH_USER:   ${{ secrets.SSH_USER }}

jobs:
  deploy:
    name: "${{ inputs.action }}${{ inputs.services != '' && format(' [{0}]', inputs.services) || '' }} @ ${{ inputs.branch }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # ── Validate inputs ────────────────────────────────────────────────────
      - name: Validate — services required for build-service / restart-service
        if: (inputs.action == 'build-service' || inputs.action == 'restart-service') && inputs.services == ''
        run: |
          echo "::error::The 'services' input is required for action '${{ inputs.action }}'."
          exit 1

      # ── Checkout (needed for deploy-config rsync) ─────────────────────────
      - name: Checkout ${{ inputs.branch }}
        if: inputs.action == 'deploy-config'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      # ── Setup SSH ──────────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      # ══════════════════════════════════════════════════════════════════════
      # deploy-env — push .env content from GitHub secret to server
      # Requires secret: ENV_FILE (full content of .env)
      # ══════════════════════════════════════════════════════════════════════
      - name: "[deploy-env] Push .env to server"
        if: inputs.action == 'deploy-env'
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s\n' "$ENV_FILE" | ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "cat > ${{ env.DEPLOY_DIR }}/.env && chmod 600 ${{ env.DEPLOY_DIR }}/.env"
          echo "✓ .env deployed"

      # ══════════════════════════════════════════════════════════════════════
      # deploy-config — rsync config-repo/ to server, then refresh config server
      # Config server reads from the bind-mounted config-repo at runtime.
      # ══════════════════════════════════════════════════════════════════════
      - name: "[deploy-config] Sync config-repo/ to server"
        if: inputs.action == 'deploy-config'
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ env.SSH_PORT }}" \
            config-repo/ \
            ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_DIR }}/config-repo/
          echo "✓ config-repo synced"

      - name: "[deploy-config] Refresh config server & restart gateway"
        if: inputs.action == 'deploy-config'
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e
            sleep 2
            curl -sf -X POST http://localhost:8888/actuator/refresh \
              -H "Content-Type: application/json" || true
            echo "✓ Config server refresh triggered"
            cd ${{ env.DEPLOY_DIR }}
            podman compose --env-file .env restart gateway
            echo "✓ gateway restarted"
          EOF

      # ══════════════════════════════════════════════════════════════════════
      # full-deploy — git pull + mvn package + rebuild all images
      # ══════════════════════════════════════════════════════════════════════
      - name: "[full-deploy] Pull code, build JARs & rebuild all containers"
        if: inputs.action == 'full-deploy'
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << EOF
            set -e

            # ── Ensure OpenJDK 21 is available ────────────────────────────
            if ! command -v java >/dev/null 2>&1; then
              echo "→ OpenJDK 21 not found — installing"
              if command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y java-21-openjdk-devel
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -q && sudo apt-get install -y -q openjdk-21-jdk
              else
                echo "✗ Cannot auto-install Java — unsupported package manager"
                exit 1
              fi
            fi
            export JAVA_HOME=/usr/lib/jvm/java-21-openjdk
            [ -x "\$JAVA_HOME/bin/javac" ] || { echo "✗ javac not found at \$JAVA_HOME — is java-21-openjdk-devel installed?"; exit 1; }
            export PATH="\$JAVA_HOME/bin:\$PATH"
            echo "→ Java: \$(java -version 2>&1 | head -1)"

            # ── Pre-flight checks ──────────────────────────────────────────
            command -v podman >/dev/null 2>&1 || { echo "✗ podman not found"; exit 1; }
            podman compose version >/dev/null 2>&1 || { echo "✗ podman compose plugin not found"; exit 1; }

            # ── Repo bootstrap or update ───────────────────────────────────
            if [ ! -d "${{ env.DEPLOY_DIR }}/.git" ]; then
              echo "→ No git repo found — initialising in ${{ env.DEPLOY_DIR }}"
              mkdir -p "${{ env.DEPLOY_DIR }}"
              git -C "${{ env.DEPLOY_DIR }}" init
              git -C "${{ env.DEPLOY_DIR }}" remote add origin https://github.com/${{ github.repository }}.git
              git -C "${{ env.DEPLOY_DIR }}" fetch origin
              git -C "${{ env.DEPLOY_DIR }}" checkout -b ${{ inputs.branch }} --track origin/${{ inputs.branch }}
            else
              echo "→ Pulling branch ${{ inputs.branch }}"
              cd "${{ env.DEPLOY_DIR }}"
              git fetch origin
              git checkout ${{ inputs.branch }}
              git reset --hard origin/${{ inputs.branch }}
              git clean -fd -e .env -e logs/
            fi

            cd "${{ env.DEPLOY_DIR }}"

            # ── .env guard ─────────────────────────────────────────────────
            if [ ! -f .env ]; then
              echo "✗ .env not found in ${{ env.DEPLOY_DIR }} — run deploy-env action first"
              exit 1
            fi

            # ── Log directories ────────────────────────────────────────────
            echo "→ Initialising log directories"
            for svc in auth-service storefront-service template-service invitation-service \
                       order-service payment-service notification-service media-service \
                       gateway-service admin-service; do
              mkdir -p "logs/\$svc"
              chmod 777 "logs/\$svc"
            done

            # ── Podman networks ────────────────────────────────────────────
            echo "→ Ensuring podman networks exist"
            podman network exists baundang-network || podman network create baundang-network
            podman network exists public           || podman network create public

            # ── Maven wrapper executable bit ───────────────────────────────
            chmod +x ./mvnw

            # ── Build JARs ─────────────────────────────────────────────────
            echo "→ Building all JARs (tests already passed in CI)"
            JAVA_HOME="\$JAVA_HOME" ./mvnw -q -DskipTests clean package

            # ── Build container images ─────────────────────────────────────
            echo "→ Building container images one by one"
            for svc in \
              config-server \
              auth-service \
              storefront-service \
              template-service \
              invitation-service \
              order-service \
              payment-service \
              notification-service \
              media-service \
              gateway \
              admin-service; do
              echo "  → Building \$svc"
              podman compose --env-file .env build \$svc
            done

            # ── Start stack ────────────────────────────────────────────────
            echo "→ Starting all containers"
            podman compose --env-file .env up -d --remove-orphans

            # ── Cleanup ────────────────────────────────────────────────────
            echo "→ Pruning unused images"
            podman image prune -f

            echo "✓ Full deploy complete at \$(date)"
          EOF

      # ══════════════════════════════════════════════════════════════════════
      # build-service — git pull + mvn package + rebuild specific service(s)
      # ══════════════════════════════════════════════════════════════════════
      - name: "[build-service] Rebuild and restart selected services"
        if: inputs.action == 'build-service'
        run: |
          # Build service list from checked boolean inputs
          SERVICES=""
          ${{ inputs.svc_config_server == true && 'SERVICES="$SERVICES config-server"' || '' }}
          ${{ inputs.svc_auth         == true && 'SERVICES="$SERVICES auth-service"'     || '' }}
          ${{ inputs.svc_storefront   == true && 'SERVICES="$SERVICES storefront-service"' || '' }}
          ${{ inputs.svc_template     == true && 'SERVICES="$SERVICES template-service"' || '' }}
          ${{ inputs.svc_invitation   == true && 'SERVICES="$SERVICES invitation-service"' || '' }}
          ${{ inputs.svc_order        == true && 'SERVICES="$SERVICES order-service"'    || '' }}
          ${{ inputs.svc_payment      == true && 'SERVICES="$SERVICES payment-service"'  || '' }}
          ${{ inputs.svc_notification == true && 'SERVICES="$SERVICES notification-service"' || '' }}
          ${{ inputs.svc_admin        == true && 'SERVICES="$SERVICES admin-service"'    || '' }}
          ${{ inputs.svc_media        == true && 'SERVICES="$SERVICES media-service"'    || '' }}
          ${{ inputs.svc_gateway      == true && 'SERVICES="$SERVICES gateway"'          || '' }}
          SERVICES="${SERVICES# }"  # trim leading space

          if [ -z "$SERVICES" ]; then
            echo "✗ No services selected — tick at least one checkbox"
            exit 1
          fi
          echo "→ Selected services: $SERVICES"

          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} SERVICES="$SERVICES" << 'ENDSSH'
            set -e
            cd "$DEPLOY_DIR"

            [ -f .env ] || { echo "✗ .env not found — run deploy-env first"; exit 1; }

            command -v java >/dev/null 2>&1 || { echo "✗ Java not found — run full-deploy first to auto-install"; exit 1; }
            export JAVA_HOME=/usr/lib/jvm/java-21-openjdk
            [ -x "$JAVA_HOME/bin/javac" ] || { echo "✗ javac not found at $JAVA_HOME — is java-21-openjdk-devel installed?"; exit 1; }
            export PATH="$JAVA_HOME/bin:$PATH"

            echo "→ Pulling latest code"
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "→ Ensuring log directories exist"
            for svc in auth-service storefront-service template-service invitation-service \
                       order-service payment-service notification-service media-service \
                       gateway-service admin-service; do
              mkdir -p "logs/$svc" && chmod 777 "logs/$svc"
            done

            podman network exists baundang-network || podman network create baundang-network
            podman network exists public           || podman network create public

            chmod +x ./mvnw

            echo "→ Building JARs for: $SERVICES"
            for svc in $SERVICES; do
              module="${svc%-service}"
              [ "$module" = "gateway" ] && module="gateway"
              [ "$module" = "config-server" ] && module="config-server"
              JAVA_HOME="$JAVA_HOME" ./mvnw -q -DskipTests -pl "${module}-service" -am clean package 2>/dev/null \
                || JAVA_HOME="$JAVA_HOME" ./mvnw -q -DskipTests -pl "$module" -am clean package
            done

            echo "→ Rebuilding images"
            for svc in $SERVICES; do
              podman compose --env-file .env build $svc
            done

            echo "→ Stopping and removing old containers"
            for svc in $SERVICES; do
              podman compose --env-file .env stop $svc || true
              podman compose --env-file .env rm -f $svc || true
            done

            echo "→ Starting new containers"
            podman compose --env-file .env up -d --no-deps $SERVICES

            echo "→ Restarting gateway"
            podman compose --env-file .env restart gateway

            echo "✓ Build-service complete: $SERVICES"
          ENDSSH

      # ══════════════════════════════════════════════════════════════════════
      # restart-service — restart specific service(s) without rebuild
      # ══════════════════════════════════════════════════════════════════════
      - name: "[restart-service] Restart ${{ inputs.services }}"
        if: inputs.action == 'restart-service'
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << EOF
            set -e
            cd "${{ env.DEPLOY_DIR }}"
            echo "→ Restarting: ${{ inputs.services }}"
            podman compose --env-file .env restart ${{ inputs.services }}
            echo "✓ Restart complete"
          EOF

      # ══════════════════════════════════════════════════════════════════════
      # restart-all — restart every container in the stack
      # ══════════════════════════════════════════════════════════════════════
      - name: "[restart-all] Restart all containers"
        if: inputs.action == 'restart-all'
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << EOF
            set -e
            cd "${{ env.DEPLOY_DIR }}"
            echo "→ Restarting all containers"
            podman compose --env-file .env restart
            echo "✓ All containers restarted"
          EOF

      # ── Post-deploy: container status ──────────────────────────────────────
      - name: Container status
        if: inputs.action != 'deploy-env' && inputs.action != 'deploy-config'
        run: |
          sleep 10
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "cd ${{ env.DEPLOY_DIR }} && podman compose --env-file .env ps"

      # ── Post-deploy: gateway health check ─────────────────────────────────
      - name: Health check — gateway
        if: inputs.action == 'full-deploy' || (inputs.action == 'build-service' && contains(inputs.services, 'gateway'))
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "
            for i in \$(seq 1 24); do
              if curl -sf http://localhost:1080/actuator/health | grep -q '\"status\":\"UP\"'; then
                echo \"✓ Gateway healthy (attempt \$i)\";
                exit 0;
              fi;
              echo \"Waiting for gateway... (\$i/24)\";
              sleep 15;
            done;
            echo '✗ Gateway not healthy after 6 minutes';
            exit 1;
          "
