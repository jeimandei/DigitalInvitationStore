spring:
  application:
    name: media-service
  config:
    import: "configserver:http://config-server:8888"
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

server:
  port: 8089

app:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket:
      templates: baundang-templates
      couples: baundang-couples
      admin: baundang-admin
  media:
    presign-put-expiry-minutes: 15
    presign-get-expiry-hours: 1
    max-image-bytes: 10485760   # 10 MB
    max-video-bytes: 52428800   # 50 MB
    allowed-types: image/jpeg,image/png,image/webp,video/mp4
