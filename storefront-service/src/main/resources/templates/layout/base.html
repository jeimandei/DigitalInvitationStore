<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id"
      th:fragment="dir(title, mainContent, headExtra)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:replace="${title}">baundang.id</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>

  <th:block th:replace="${headExtra}"></th:block>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased">

<nav class="sticky top-0 z-40 bg-white/80 backdrop-blur border-b border-stone-100"
     x-data="{ open: false }">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-16">
    <a href="/" class="text-xl font-semibold tracking-tight text-rose-600">baundang<span class="text-stone-400">.id</span></a>

    <div class="hidden md:flex items-center gap-6 text-sm font-medium text-stone-600">
      <a href="/templates" class="hover:text-rose-600 transition-colors">Template</a>
      <a href="/tentang"   class="hover:text-rose-600 transition-colors">Tentang</a>
      <a href="/pesan"
         class="bg-rose-600 text-white px-4 py-2 rounded-full hover:bg-rose-700 transition-colors">
        Pesan Sekarang
      </a>
    </div>

    <button @click="open = !open" class="md:hidden p-2 rounded-lg hover:bg-stone-100">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <div x-show="open" x-cloak x-transition
       class="md:hidden border-t border-stone-100 bg-white px-4 pb-4 flex flex-col gap-3 text-sm font-medium">
    <a href="/templates" class="py-2 hover:text-rose-600">Template</a>
    <a href="/tentang"   class="py-2 hover:text-rose-600">Tentang</a>
    <a href="/pesan"     class="py-2 text-rose-600 font-semibold">Pesan Sekarang</a>
  </div>
</nav>

<main th:replace="${mainContent}"></main>

<footer class="border-t border-stone-100 mt-24 py-10 text-center text-sm text-stone-400">
  <p>&copy; 2025 baundang.id &mdash; Undangan pernikahan digital yang berkesan.</p>
</footer>

</body>
</html>
