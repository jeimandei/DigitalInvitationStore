<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: dir(title=~{::title},main-content=~{::main},head-extra=~{::head-extra})}">

<title>Template Undangan — baundang.id</title>
<th:block th:fragment="head-extra"></th:block>

<main th:fragment="main-content">
  <section class="max-w-6xl mx-auto px-4 py-16">

    <div class="mb-10">
      <h1 class="text-3xl font-bold text-stone-800">Pilih Template</h1>
      <p class="text-stone-400 mt-2">Temukan desain yang paling mencerminkan kisah cintamu</p>
    </div>

    <div class="flex flex-wrap gap-2 mb-8"
         x-data="{ active: '' }"
         hx-boost="true">
      <button th:each="cat : ${ {'Semua','Minimalis','Floral','Modern','Tradisional','Islami'} }"
              th:text="${cat}"
              th:attr="hx-get='/templates?kategori=' + ${#strings.equals(cat,'Semua') ? '' : cat} + '&htmx=true',
                       hx-target='#template-grid',
                       hx-swap='innerHTML'"
              :class="active === [[${cat}]] ? 'bg-rose-600 text-white' : 'bg-white border border-stone-200 text-stone-600 hover:border-rose-300'"
              @click="active = $el.textContent.trim()"
              class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors cursor-pointer">
      </button>
    </div>

    <div id="grid-indicator" class="htmx-indicator text-center py-4">
      <svg class="animate-spin inline w-6 h-6 text-rose-400" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>
    </div>

    <div id="template-grid">
      <th:block th:insert="~{fragments/template-cards :: cards}"></th:block>
    </div>

  </section>
</main>
</html>
