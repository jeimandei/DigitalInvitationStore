<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="cards">

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
    <div th:each="t : ${templates}"
         class="group rounded-2xl overflow-hidden border border-stone-100 bg-white shadow-sm hover:shadow-md transition-shadow">
      <a th:href="'/templates/' + ${t.slug}">
        <div class="aspect-[3/4] overflow-hidden bg-stone-100">
          <img th:src="${t.thumbnailUrl}" th:alt="${t.name}"
               class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
               loading="lazy"
               onerror="this.src='/img/placeholder.svg'"/>
        </div>
        <div class="p-4">
          <p class="font-medium text-stone-800 truncate" th:text="${t.name}">Nama Template</p>
          <div class="flex items-center justify-between mt-1">
            <span class="text-xs text-stone-400 capitalize" th:text="${t.category}">Kategori</span>
            <span class="text-xs font-semibold text-rose-500 capitalize" th:text="${t.priceLevel}">Level</span>
          </div>
        </div>
      </a>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(templates)}" class="text-center py-20 text-stone-400">
    <p class="text-5xl mb-4">🌸</p>
    <p class="font-medium">Belum ada template di kategori ini.</p>
    <p class="text-sm mt-1">Coba pilih kategori lain atau kembali nanti.</p>
  </div>

  <div th:if="${not isLast}"
       th:attr="hx-get='/templates?page=' + ${nextPage} + '&htmx=true' + (${kategori} != null ? '&amp;kategori=' + ${kategori} : ''),
                hx-trigger='revealed',
                hx-swap='afterend',
                hx-indicator='#grid-indicator'"
       class="h-4">
  </div>

</th:block>
</body>
</html>
