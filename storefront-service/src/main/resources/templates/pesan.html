<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: dir(title=~{::title},mainContent=~{::main})}">

<title>Pesan Undangan — baundang.id</title>

<main th:fragment="main-content">
  <section class="max-w-2xl mx-auto px-4 py-16">

    <div class="mb-10">
      <h1 class="text-3xl font-bold text-stone-800">Pesan Undangan</h1>
      <p class="text-stone-400 mt-2">Isi informasi berikut untuk memulai undangan digitalmu</p>
    </div>

    <div class="flex items-center gap-2 mb-10 text-xs font-semibold">
      <div class="flex items-center gap-2 text-rose-600">
        <span class="w-6 h-6 rounded-full bg-rose-600 text-white flex items-center justify-center">1</span>
        <span>Data Pasangan</span>
      </div>
      <div class="flex-1 h-px bg-stone-200"></div>
      <div class="flex items-center gap-2 text-stone-300">
        <span class="w-6 h-6 rounded-full border-2 border-stone-200 flex items-center justify-center">2</span>
        <span>Pilih Paket</span>
      </div>
      <div class="flex-1 h-px bg-stone-200"></div>
      <div class="flex items-center gap-2 text-stone-300">
        <span class="w-6 h-6 rounded-full border-2 border-stone-200 flex items-center justify-center">3</span>
        <span>Pembayaran</span>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-stone-100 shadow-sm p-8"
         x-data="{
           step: 1,
           form: { namaPria: '', namaWanita: '', tanggal: '', lokasi: '', paket: '' },
           next() { if (this.step < 2) this.step++ },
           prev() { if (this.step > 1) this.step-- }
         }">

      <div x-show="step === 1">
        <h2 class="text-lg font-semibold text-stone-800 mb-6">Data Pasangan</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Nama Pria</label>
            <input type="text" x-model="form.namaPria" placeholder="Contoh: Budi Santoso"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-300"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Nama Wanita</label>
            <input type="text" x-model="form.namaWanita" placeholder="Contoh: Siti Rahayu"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-300"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Tanggal Pernikahan</label>
            <input type="date" x-model="form.tanggal"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-300"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1">Lokasi Acara</label>
            <input type="text" x-model="form.lokasi" placeholder="Nama gedung / alamat"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-300"/>
          </div>
        </div>

        <button @click="next()"
                :disabled="!form.namaPria || !form.namaWanita || !form.tanggal"
                class="mt-8 w-full bg-rose-600 text-white py-3 rounded-full text-sm font-semibold hover:bg-rose-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          Lanjut Pilih Paket →
        </button>
      </div>

      <div x-show="step === 2" x-cloak>
        <h2 class="text-lg font-semibold text-stone-800 mb-6">Pilih Paket</h2>

        <div class="space-y-3">
          <label th:each="tier : ${tiers}"
                 :class="form.paket === [[${tier.name}]] ? 'ring-2 ring-rose-500 bg-rose-50' : 'border border-stone-200'"
                 class="flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all"
                 th:attr="x-on:click=|form.paket = '| + ${tier.name} + |'|"
          >
            <input type="radio" x-model="form.paket" th:value="${tier.name}" class="accent-rose-600"/>
            <div class="flex-1">
              <div class="flex items-center justify-between">
                <span class="font-semibold text-stone-800" th:text="${tier.name}">Paket</span>
                <span class="font-bold text-rose-600" th:text="${tier.formattedPrice}">Rp 0</span>
              </div>
              <p class="text-xs text-stone-400 mt-0.5" th:text="${tier.description}">Deskripsi</p>
            </div>
          </label>
        </div>

        <div class="flex gap-3 mt-8">
          <button @click="prev()"
                  class="flex-1 border border-stone-200 text-stone-600 py-3 rounded-full text-sm font-semibold hover:bg-stone-50 transition-colors">
            ← Kembali
          </button>
          <button @click="$dispatch('submit-order', form)"
                  :disabled="!form.paket"
                  class="flex-1 bg-rose-600 text-white py-3 rounded-full text-sm font-semibold hover:bg-rose-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
            Lanjut ke Pembayaran →
          </button>
        </div>
      </div>

    </div>
  </section>
</main>
</html>
