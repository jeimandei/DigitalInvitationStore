server:
  port: 1081

# spring.datasource.url/username/password are injected via SPRING_DATASOURCE_* in podman-compose

app:
  admin-seed-key: ${ADMIN_SEED_KEY:}
  jwt:
    keys-dir: /secrets/auth
    admin-expiry-hours: 8
    buyer-expiry-hours: 24
    order-token-expiry-minutes: 60
    refresh-expiry-days: 30

spring:
  flyway:
    default-schema: auth
    schemas: auth
    create-schemas: true
  jpa:
    properties:
      hibernate:
        default_schema: auth
