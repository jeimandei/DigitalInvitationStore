server:
  port: 8089

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

app:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ROOT_USER}
    secret-key: ${MINIO_ROOT_PASSWORD}
    bucket:
      templates: baundang-templates
      couples: baundang-couples
      admin: baundang-admin
  media:
    presign-put-expiry-minutes: 15
    presign-get-expiry-hours: 1
    max-image-bytes: 10485760
    max-video-bytes: 52428800
    allowed-types: image/jpeg,image/png,image/webp,video/mp4
