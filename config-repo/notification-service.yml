server:
  port: 1087

spring:
  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    default-schema: notification
    schemas: notification
    create-schemas: true
  jpa:
    properties:
      hibernate:
        default_schema: notification

management:
  health:
    mail:
      enabled: false

app:
  fonnte:
    token: ${WHATSAPP_API_TOKEN}
    url: https://api.fonnte.com/send
  admin:
    whatsapp: ${ADMIN_WHATSAPP:6281234567890}
  services:
    invitation-service: ${INVITATION_SERVICE_URL:http://invitation-service:1084}
  rabbitmq:
    orders-exchange: baundang.orders
    invitations-exchange: baundang.invitations
    rsvp-exchange: baundang.rsvp

logging:
  level:
    id.baundang.common.logging.ServiceLoggingAspect: DEBUG
