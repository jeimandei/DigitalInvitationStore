server:
  port: 1085

app:
  pricing:
    tiers:
      - name: Dasar
        price: 119000
      - name: Standar
        price: 199000
      - name: Premium
        price: 249000
  rabbitmq:
    exchange: baundang.orders
    routing-key:
      created: order.created
      paid: order.paid
      revised: order.revised
      revision-completed: revision.completed

spring:
  flyway:
    default-schema: orders
    schemas: orders
    create-schemas: true
  jpa:
    properties:
      hibernate:
        default_schema: orders

logging:
  level:
    id.baundang.common.logging.ServiceLoggingAspect: DEBUG
