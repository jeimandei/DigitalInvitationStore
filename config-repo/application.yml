# Shared config — applied to every service.
# Datasource URL/user/password are injected per-service via SPRING_DATASOURCE_* env vars in podman-compose.

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: rabbitmq
    port: 5672
    virtual-host: ${RABBITMQ_VHOST:baundang}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  task:
    scheduling:
      pool:
        size: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    id.baundang: DEBUG
