server:
  port: 1080

spring:
  # Gateway has no JPA/Flyway — exclude to avoid startup errors
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 200
            redis-rate-limiter.burstCapacity: 400
            key-resolver: "#{@ipKeyResolver}"

      routes:
        - id: invitation-viewer
          uri: http://invitation-service:1084
          predicates:
            - Path=/i/**

        - id: storefront
          uri: http://storefront-service:1082
          predicates:
            - Path=/, /templates, /templates/**, /pesan, /pesan/**, /bayar, /bayar/**, /tentang, /tentang/**, /masuk, /masuk/**, /daftar, /daftar/**, /sitemap.xml, /robots.txt

        - id: admin-login
          uri: http://admin-service:1088
          predicates:
            - Path=/admin/login

        - id: admin-ui
          uri: http://admin-service:1088
          predicates:
            - Path=/admin, /admin/**
          filters:
            - "JwtAuth=ADMIN"

        - id: template-service
          uri: http://template-service:1083
          predicates:
            - Path=/api/v1/templates/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-service
          uri: http://auth-service:1081
          predicates:
            - Path=/api/v1/auth/**

        - id: order-create
          uri: http://order-service:1085
          predicates:
            - Path=/api/v1/orders
            - Method=POST

        - id: order-public
          uri: http://order-service:1085
          predicates:
            - Path=/api/v1/orders/public/**
            - Method=GET

        - id: order-service
          uri: http://order-service:1085
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtAuth

        - id: payment-webhook
          uri: http://payment-service:1086
          predicates:
            - Path=/api/v1/payments/webhook/**

        - id: payment-snap-token
          uri: http://payment-service:1086
          predicates:
            - Path=/api/v1/payments/snap-token/**
            - Method=GET

        - id: payment-service
          uri: http://payment-service:1086
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - JwtAuth

        - id: media-service
          uri: http://media-service:1089
          predicates:
            - Path=/api/v1/media/**
          filters:
            - JwtAuth

        - id: admin-api
          uri: http://admin-service:1088
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - "JwtAuth=ADMIN"

        - id: notification-service
          uri: http://notification-service:1087
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - "JwtAuth=ADMIN"

        - id: invitation-api
          uri: http://invitation-service:1084
          predicates:
            - Path=/api/v1/invitations/**

app:
  auth:
    public-key-uri: http://auth-service:1081/api/v1/auth/public-key

logging:
  level:
    id.baundang.common.logging.ServiceLoggingAspect: DEBUG
